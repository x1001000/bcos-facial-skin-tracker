# fly.toml app configuration file generated for bcos-facial-skin-tracker on 2026-05-23T07:56:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bcos-facial-skin-tracker'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'bcos_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
